<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Global Voices</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f5f6f8; min-height: 100vh; padding-bottom: 80px; }

        .top-nav { background: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f1f3; position: sticky; top: 0; z-index: 50; }
        .nav-title { font-size: 17px; font-weight: 700; color: #1a1a2e; }

        .profile-header { background: linear-gradient(135deg, #2563eb, #7c3aed); padding: 32px 20px 24px; text-align: center; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; border: 3px solid rgba(255,255,255,0.4); }
        .profile-username { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .profile-email { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 10px; }
        .country-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .edit-profile-btn { margin-top: 12px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 6px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .edit-profile-btn:hover { background: rgba(255,255,255,0.25); }

        .stats-row { display: flex; background: white; border-bottom: 1px solid #f0f1f3; }
        .stat-item { flex: 1; padding: 16px; text-align: center; border-right: 1px solid #f0f1f3; }
        .stat-item:last-child { border-right: none; }
        .stat-num { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .stat-label { font-size: 11px; color: #9ca3af; margin-top: 2px; }

        .section { padding: 16px; }
        .section-label { font-size: 12px; font-weight: 600; color: #9ca3af; letter-spacing: 1px; padding: 8px 0; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

        .post-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0f1f3; cursor: pointer; }
        .post-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .post-time { font-size: 12px; color: #9ca3af; margin-left: auto; }
        .post-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; line-height: 1.4; }
        .post-content { font-size: 13px; color: #6b7280; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .logout-btn { margin: 0 16px 16px; width: calc(100% - 32px); padding: 14px; background: white; color: #ef4444; border: 1.5px solid #ef4444; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }

        .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 14px; }
        .empty { text-align: center; padding: 30px; color: #9ca3af; font-size: 14px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f0f1f3; display: flex; justify-content: space-around; padding: 10px 0 20px; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
        .nav-icon { font-size: 22px; color: #9ca3af; }
        .nav-label { font-size: 10px; color: #9ca3af; }
        .nav-item.active .nav-icon, .nav-item.active .nav-label { color: #2563eb; }
        .post-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #2563eb, #7c3aed); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; margin-top: -8px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); cursor: pointer; }

        .edit-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .edit-modal.show { display: flex; }
        .edit-modal-content { background: white; border-radius: 16px; width: 90%; max-width: 360px; max-height: 85vh; overflow-y: auto; }
        .edit-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f1f3; }
        .edit-modal-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
        .edit-modal-close { background: none; border: none; font-size: 20px; color: #9ca3af; cursor: pointer; padding: 0; }
        .edit-modal-body { padding: 20px; }
        .edit-modal-body label { display: block; font-size: 13px; color: #374151; margin-bottom: 8px; font-weight: 600; }
        .edit-modal-body .form-input { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; margin-bottom: 20px; }
        .edit-modal-body .form-input:focus { outline: none; border-color: #2563eb; }
        .avatar-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }
        .avatar-option { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #e5e7eb; border-radius: 12px; cursor: pointer; transition: all 0.2s; background: white; }
        .avatar-option:hover { border-color: #93c5fd; }
        .avatar-option.selected { border-color: #2563eb; background: #eff6ff; transform: scale(1.05); }
        .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="top-nav">
    <span class="nav-title">My Profile</span>
</div>

<div class="profile-header">
    <div class="avatar" id="avatarEmoji">🌍</div>
    <div class="profile-username" id="profileUsername">Loading...</div>
    <div class="profile-email" id="profileEmail">Loading...</div>
    <div class="country-badge" id="countryBadge">Loading...</div>
    <br>
    <button class="edit-profile-btn" onclick="openEditModal()">Edit Profile</button>
</div>

<div class="stats-row">
    <div class="stat-item">
        <div class="stat-num" id="postCount">-</div>
        <div class="stat-label">Posts</div>
    </div>
    <div class="stat-item">
        <div class="stat-num" id="replyCount">-</div>
        <div class="stat-label">Replies</div>
    </div>
    <div class="stat-item">
        <div class="stat-num" id="joinDays">-</div>
        <div class="stat-label">Days Joined</div>
    </div>
</div>

<div class="section">
    <div class="section-label">My Posts</div>
    <div id="myPosts"><div class="loading">Loading...</div></div>
</div>

<button class="logout-btn" onclick="logout()">Log Out</button>

<div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='index.html'">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Discover</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">🏳️</span>
        <span class="nav-label">Countries</span>
    </div>
    <div class="post-btn" onclick="window.location.href='post.html'">+</div>
    <div class="nav-item">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Messages</span>
    </div>
    <div class="nav-item active">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
    </div>
</div>

<div class="edit-modal" id="editModal">
    <div class="edit-modal-content">
        <div class="edit-modal-header">
            <span class="edit-modal-title">Edit Profile</span>
            <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
        </div>
        <div class="edit-modal-body">
            <label>Username</label>
            <input type="text" id="editUsername" class="form-input" placeholder="Choose a username" maxlength="20">
            <label>Choose Avatar</label>
            <div class="avatar-picker" id="editAvatarPicker"></div>
            <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient(
        'https://rkgwaucoldxpezwgjuoo.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZ3dhdWNvbGR4cGV6d2dqdW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTI0OTYsImV4cCI6MjA5NzY4ODQ5Nn0.nwD1Uymq6b0CoYrezLBdypA8coUJJRDt_APjcaQ2094'
    );

    const countryMap = { 'CN': '🇨🇳 中国', 'US': '🇺🇸 America', 'JP': '🇯🇵 日本', 'DE': '🇩🇪 Deutschland', 'FR': '🇫🇷 France', 'KR': '🇰🇷 한국', 'IN': '🇮🇳 भारत' };
    const flagMap = { 'CN': '🇨🇳', 'US': '🇺🇸', 'JP': '🇯🇵', 'DE': '🇩🇪', 'FR': '🇫🇷', 'KR': '🇰🇷', 'IN': '🇮🇳' };
    const avatarList = ['🦊','🐼','🐨','🐱','🐶','🦁','🐯','🐸','🐧','🦉','🐙','🦄','🐲','🐳','🐬','🦓','🐝','🦜'];

    let currentUser = null;
    let editSelectedAvatar = '🦊';

    function timeAgo(dateStr) {
        const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
    }

    function openEditModal() {
        const currentUsername = currentUser?.user_metadata?.username || '';
        const currentAvatar = currentUser?.user_metadata?.avatar || '🌍';
        document.getElementById('editUsername').value = currentUsername;
        editSelectedAvatar = currentAvatar;
        const picker = document.getElementById('editAvatarPicker');
        picker.innerHTML = avatarList.map(a =>
            `<div class="avatar-option ${a === currentAvatar ? 'selected' : ''}" data-avatar="${a}" onclick="selectEditAvatar(this)">${a}</div>`
        ).join('');
        document.getElementById('editModal').classList.add('show');
    }

    function closeEditModal() {
        document.getElementById('editModal').classList.remove('show');
    }

    function selectEditAvatar(el) {
        document.querySelectorAll('#editAvatarPicker .avatar-option').forEach(a => a.classList.remove('selected'));
        el.classList.add('selected');
        editSelectedAvatar = el.dataset.avatar;
    }

    async function saveProfile() {
        const newUsername = document.getElementById('editUsername').value.trim();
        if (!newUsername) { alert('Please enter a username'); return; }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = 'Saving...';

        const { data, error } = await client.auth.updateUser({
            data: { username: newUsername, avatar: editSelectedAvatar }
        });

        if (error) {
            alert('Save failed: ' + error.message);
            btn.disabled = false;
            btn.innerText = 'Save';
            return;
        }

        document.getElementById('avatarEmoji').innerText = editSelectedAvatar;
        document.getElementById('profileUsername').innerText = newUsername;
        currentUser = data.user;
        btn.disabled = false;
        btn.innerText = 'Save';
        closeEditModal();
    }

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }

        const user = session.user;
        currentUser = user;
        const country = user.user_metadata?.country_code || 'CN';
        const username = user.user_metadata?.username || 'Not set';
        const avatar = user.user_metadata?.avatar || '🌍';

        document.getElementById('avatarEmoji').innerText = avatar;
        document.getElementById('profileUsername').innerText = username;
        document.getElementById('profileEmail').innerText = user.email;
        document.getElementById('countryBadge').innerText = '📍 ' + (countryMap[country] || country);

        const joinDays = Math.floor((new Date() - new Date(user.created_at)) / 86400000);
        document.getElementById('joinDays').innerText = joinDays || 1;

        const { data: posts, error } = await client
            .from('posts')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        document.getElementById('postCount').innerText = posts?.length || 0;

        if (error || !posts || posts.length === 0) {
            document.getElementById('myPosts').innerHTML = '<div class="empty">No posts yet</div>';
        } else {
            document.getElementById('myPosts').innerHTML = posts.map(post => `
                <div class="post-card" onclick="window.location.href='post-detail.html?id=${post.id}'">
                    <div class="post-meta">
                        <span style="font-size:16px">${flagMap[post.country_code] || '🌍'}</span>
                        <span style="font-size:12px;color:#9ca3af">${countryMap[post.country_code] || post.country_code}</span>
                        <span class="post-time">${timeAgo(post.created_at)}</span>
                    </div>
                    <div class="post-title">${post.title}</div>
                    <div class="post-content">${post.content}</div>
                </div>
            `).join('');
        }

        const { count } = await client
            .from('replies')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', user.id);

        document.getElementById('replyCount').innerText = count || 0;
    }

    async function logout() {
        await client.auth.signOut();
        window.location.href = 'login.html';
    }

    init();
</script>
</body>
</html>
