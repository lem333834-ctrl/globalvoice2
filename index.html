<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient(
        'https://rkgwaucoldxpezwgjuoo.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZ3dhdWNvbGR4cGV6d2dqdW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTI0OTYsImV4cCI6MjA5NzY4ODQ5Nn0.nwD1Uymq6b0CoYrezLBdypA8coUJJRDt_APjcaQ2094'
    );
    const countryMap = { 'CN': '🇨🇳 中国', 'US': '🇺🇸 美国', 'JP': '🇯🇵 日本', 'DE': '🇩🇪 德国', 'FR': '🇫🇷 法国', 'KR': '🇰🇷 韩国', 'IN': '🇮🇳 印度' };
    const flagMap = { 'CN': '🇨🇳', 'US': '🇺🇸', 'JP': '🇯🇵', 'DE': '🇩🇪', 'FR': '🇫🇷', 'KR': '🇰🇷', 'IN': '🇮🇳' };

    function timeAgo(dateStr) {
        const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff/60) + '分钟前';
        if (diff < 86400) return Math.floor(diff/3600) + '小时前';
        return Math.floor(diff/86400) + '天前';
    }

    async function loadPosts(countryFilter) {
        const list = document.getElementById('postList');
        list.innerHTML = '<div class="loading">加载中...</div>';
        let query = client.from('posts').select('*').order('created_at', { ascending: false });
        if (countryFilter) query = query.eq('country_code', countryFilter);
        const { data, error } = await query;
        if (error) { list.innerHTML = '<div class="empty">加载失败，请刷新重试</div>'; return; }
        if (!data || data.length === 0) { list.innerHTML = '<div class="empty">还没有帖子，来发第一条吧 🌍</div>'; return; }
        list.innerHTML = data.map(post => `
            <div class="post-card" onclick="window.location.href='post-detail.html?id=${post.id}'">
                <div class="post-meta">
                    <span class="flag">${flagMap[post.country_code] || '🌍'}</span>
                    <span class="post-country">${countryMap[post.country_code] || post.country_code}</span>
                    <span class="post-time">${timeAgo(post.created_at)}</span>
                </div>
                <div class="post-title">${post.title}</div>
                <div class="post-content">${post.content}</div>
            </div>
        `).join('');
    }

    function filterPosts(btn, country) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        loadPosts(country);
    }

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        const country = session.user.user_metadata?.country_code || 'CN';
        document.getElementById('userBadge').innerText = '📍 ' + (countryMap[country] || country);
        loadPosts('');
    }

    init();
</script>
</body>
