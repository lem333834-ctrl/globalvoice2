<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 全球声音</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f5f6f8; min-height: 100vh; padding-bottom: 120px; }

        .top-nav { background: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f1f3; position: sticky; top: 0; z-index: 50; }
        .back-btn { font-size: 22px; cursor: pointer; color: #6b7280; }
        .nav-title { font-size: 17px; font-weight: 700; color: #1a1a2e; }

        .post-card { background: white; padding: 20px; margin: 16px; border-radius: 16px; border: 1px solid #f0f1f3; }
        .post-author { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .author-avatar { width: 40px; height: 40px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .author-info { display: flex; flex-direction: column; gap: 2px; }
        .author-name { font-size: 14px; font-weight: 700; color: #1a1a2e; }
        .author-meta { display: flex; align-items: center; gap: 6px; }
        .author-meta span { font-size: 12px; color: #9ca3af; }
        .post-time { font-size: 12px; color: #9ca3af; }
        .post-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; line-height: 1.4; }
        .post-content { font-size: 15px; color: #4b5563; line-height: 1.6; }

        .replies-header { padding: 0 16px; margin-bottom: 8px; }
        .section-label { font-size: 12px; font-weight: 600; color: #9ca3af; letter-spacing: 1px; padding: 8px 0; display: flex; align-items: center; gap: 6px; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

        .sort-divider { display: flex; align-items: center; gap: 8px; padding: 12px 16px 8px; }
        .sort-divider .sort-icon { font-size: 14px; }
        .sort-divider .sort-text { font-size: 13px; font-weight: 700; color: #374151; }
        .sort-divider .sort-line { flex: 1; height: 1px; background: #e5e7eb; }

        .reply-card { background: white; border-radius: 12px; padding: 14px; margin: 0 16px 8px; border: 1px solid #f0f1f3; transition: opacity 0.15s; }
        .reply-card-child { margin-left: 44px; border-left: 3px solid #e5e7eb; }
        .reply-card-context { opacity: 0.6; background: #f9fafb; border-style: dashed; }
        .reply-card-context .reply-content { font-size: 13px; color: #6b7280; }

        .reply-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .reply-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .reply-author-info { display: flex; flex-direction: column; gap: 1px; }
        .reply-author-name { font-size: 13px; font-weight: 700; color: #1a1a2e; }
        .reply-meta { display: flex; align-items: center; gap: 6px; }
        .reply-meta span { font-size: 11px; color: #9ca3af; }
        .reply-time { font-size: 11px; color: #9ca3af; margin-left: auto; }
        .reply-content { font-size: 14px; color: #374151; line-height: 1.5; padding-left: 40px; }

        .hot-badge { font-size: 10px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 2px 7px; border-radius: 6px; margin-left: auto; }

        .reply-actions { display: flex; align-items: center; gap: 4px; padding-left: 40px; margin-top: 8px; }
        .vote-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 8px; font-size: 13px; color: #6b7280; cursor: pointer; user-select: none; transition: all 0.12s; }
        .vote-btn:hover { background: #f3f4f6; }
        .vote-btn.like-active { color: #2563eb; background: #eff6ff; }
        .vote-btn.dislike-active { color: #ef4444; background: #fef2f2; }
        .vote-btn:active { transform: scale(0.92); }
        .vote-btn .vote-count { font-weight: 600; font-size: 12px; }

        .reply-action-btn { font-size: 12px; color: #9ca3af; cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: all 0.12s; }
        .reply-action-btn:hover { background: #f3f4f6; color: #2563eb; }

        .inline-reply-input { margin: 8px 0 0 40px; padding: 10px; background: #f9fafb; border-radius: 10px; border: 1px solid #e5e7eb; }
        .inline-reply-textarea { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; resize: none; min-height: 38px; max-height: 80px; line-height: 1.4; font-family: inherit; }
        .inline-reply-textarea:focus { outline: none; border-color: #2563eb; }
        .inline-reply-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
        .inline-reply-cancel { padding: 5px 12px; border: 1px solid #d1d5db; border-radius: 8px; background: white; font-size: 12px; color: #6b7280; cursor: pointer; }
        .inline-reply-submit { padding: 5px 14px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .inline-reply-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .children-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 16px 6px 60px; cursor: pointer; color: #6b7280; font-size: 13px; transition: color 0.12s; margin-bottom: 4px; }
        .children-toggle:hover { color: #2563eb; }
        .children-toggle .toggle-line { width: 16px; height: 1px; background: #d1d5db; }
        .children-toggle .toggle-text { font-weight: 500; }

        .empty-replies { text-align: center; padding: 30px; color: #9ca3af; font-size: 14px; }
        .loading { text-align: center; padding: 30px; color: #9ca3af; font-size: 14px; }

        .reply-box { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f0f1f3; padding: 12px 16px 28px; }
        .reply-input-row { display: flex; gap: 10px; align-items: flex-end; }
        .reply-input { flex: 1; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 12px; font-size: 14px; resize: none; min-height: 44px; max-height: 100px; line-height: 1.4; font-family: inherit; }
        .reply-input:focus { outline: none; border-color: #2563eb; }
        .reply-btn { padding: 12px 18px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .reply-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .cooldown-tip { font-size: 11px; color: #f59e0b; margin-top: 6px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <span class="back-btn" onclick="window.location.href='index.html'">←</span>
    <span class="nav-title">帖子详情</span>
</div>

<div id="postDetail"><div class="loading">加载中...</div></div>

<div class="replies-header">
    <div class="section-label">全球回复</div>
</div>

<div id="repliesList"><div class="loading">加载回复...</div></div>

<div class="reply-box">
    <div class="reply-input-row">
        <textarea id="replyInput" class="reply-input" placeholder="发表你的跨国观点..." rows="1"></textarea>
        <button class="reply-btn" id="replyBtn" onclick="submitReply()">回复</button>
    </div>
    <div class="cooldown-tip" id="cooldownTip">⏳ 请等待15秒冷静期后再发送</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient(
        'https://rkgwaucoldxpezwgjuoo.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZ3dhdWNvbGR4cGV6d2dqdW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTI0OTYsImV4cCI6MjA5NzY4ODQ5Nn0.nwD1Uymq6b0CoYrezLBdypA8coUJJRDt_APjcaQ2094'
    );

    const countryMap = {
        'CN': '🇨🇳 中国', 'US': '🇺🇸 美国', 'JP': '🇯🇵 日本',
        'DE': '🇩🇪 德国', 'FR': '🇫🇷 法国', 'KR': '🇰🇷 韩国', 'IN': '🇮🇳 印度'
    };
    const flagMap = {
        'CN': '🇨🇳', 'US': '🇺🇸', 'JP': '🇯🇵',
        'DE': '🇩🇪', 'FR': '🇫🇷', 'KR': '🇰🇷', 'IN': '🇮🇳'
    };

    let postId = null;
    let userCountry = null;
    let currentUser = null;
    let isOwnPost = false;
    let cooldownActive = false;

    // 缓存数据
    let replyData = {};        // 所有回复，按 id 索引
    let topLevelReplies = [];   // 顶级评论
    let childrenMap = {};       // parentId -> [子回复]
    let userVotes = {};         // replyId -> 'like' | 'dislike'
    let votingLocks = {};       // 防并发
    let activeReplyInput = null; // 当前打开的内联回复输入框

    function timeAgo(dateStr) {
        const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff/60) + '分钟前';
        if (diff < 86400) return Math.floor(diff/3600) + '小时前';
        return Math.floor(diff/86400) + '天前';
    }

    async function loadPost() {
        const { data, error } = await client.from('posts').select('*').eq('id', postId).single();
        if (error || !data) {
            document.getElementById('postDetail').innerHTML = '<div class="loading">帖子不存在</div>';
            return;
        }

        const authorName = data.author_name || '匿名用户';
        const authorAvatar = data.author_avatar || flagMap[data.country_code] || '🌍';

        document.getElementById('postDetail').innerHTML = `
            <div class="post-card">
                <div class="post-author">
                    <div class="author-avatar">${authorAvatar}</div>
                    <div class="author-info">
                        <div class="author-name">${authorName}</div>
                        <div class="author-meta">
                            <span>${flagMap[data.country_code] || '🌍'} ${countryMap[data.country_code] || data.country_code}</span>
                            <span>·</span>
                            <span class="post-time">${timeAgo(data.created_at)}</span>
                        </div>
                    </div>
                </div>
                <div class="post-title">${data.title}</div>
                <div class="post-content">${data.content}</div>
            </div>
        `;
    }

    async function loadUserVotes(replyIds) {
        if (!currentUser || replyIds.length === 0) return;
        const { data } = await client.from('reply_votes')
            .select('reply_id, vote_type')
            .eq('user_id', currentUser.id)
            .in('reply_id', replyIds);
        if (data) {
            data.forEach(v => { userVotes[v.reply_id] = v.vote_type; });
        }
    }

    async function loadReplies() {
        activeReplyInput = null;
        const { data, error } = await client.from('replies')
            .select('*').eq('post_id', postId).order('created_at', { ascending: true });
        const list = document.getElementById('repliesList');

        if (error) { list.innerHTML = '<div class="empty-replies">加载失败</div>'; return; }
        if (!data || data.length === 0) { list.innerHTML = '<div class="empty-replies">还没有回复，来发第一条跨国评论 🌍</div>'; return; }

        // 缓存所有回复
        replyData = {};
        data.forEach(r => { replyData[r.id] = r; });

        // 分离顶级评论和子回复
        topLevelReplies = data.filter(r => !r.parent_id || !replyData[r.parent_id]);
        childrenMap = {};
        data.filter(r => r.parent_id && replyData[r.parent_id]).forEach(r => {
            if (!childrenMap[r.parent_id]) childrenMap[r.parent_id] = [];
            childrenMap[r.parent_id].push(r);
        });

        // 加载用户投票记录
        userVotes = {};
        await loadUserVotes(data.map(r => r.id));

        // 所有回复按点赞排序，取前5为热门
        const allRanked = [...data].sort((a, b) => {
            const likeDiff = (b.likes || 0) - (a.likes || 0);
            if (likeDiff !== 0) return likeDiff;
            return new Date(b.created_at) - new Date(a.created_at);
        });
        const top5 = allRanked.slice(0, 5);
        const top5Ids = new Set(top5.map(r => r.id));

        // 找出热门区需要显示的根父评论
        const hotParentIds = new Set();
        top5.forEach(r => {
            const rootId = r.parent_id || r.id;
            hotParentIds.add(rootId);
        });

        // 按「组内最高点赞」排序热门父评论
        const hotParentsArray = [...hotParentIds].map(parentId => {
            const parent = replyData[parentId];
            const children = childrenMap[parentId] || [];
            const allInGroup = [parent, ...children];
            const maxLikes = Math.max(...allInGroup.map(r => r.likes || 0));
            return { parent, children, maxLikes };
        }).sort((a, b) => b.maxLikes - a.maxLikes);

        let html = '';
        const hotShownIds = new Set();

        // ===== 热门区 =====
        if (hotParentsArray.length > 0) {
            html += `<div class="sort-divider"><span class="sort-icon">🔥</span><span class="sort-text">热门回复</span><span class="sort-line"></span></div>`;

            hotParentsArray.forEach(({ parent, children }) => {
                const parentIsHot = top5Ids.has(parent.id);
                const hasHotChild = children.some(c => top5Ids.has(c.id));

                // 子回复按时间从旧到新排序
                const sortedChildren = [...children].sort((a, b) =>
                    new Date(a.created_at) - new Date(b.created_at));

                if (parentIsHot) {
                    // 父评论本身是热门 → 完整显示 + 热门标签
                    hotShownIds.add(parent.id);
                    html += renderReplyCard(parent, true, false, false);
                    // 子回复：如果有热门子回复则自动展开，否则收起
                    if (sortedChildren.length > 0) {
                        html += renderChildrenBlock(parent.id, sortedChildren, top5Ids, hasHotChild);
                        sortedChildren.forEach(c => hotShownIds.add(c.id));
                    }
                } else if (hasHotChild) {
                    // 父评论仅作为上下文 → 缩进 + 淡化显示
                    hotShownIds.add(parent.id);
                    html += renderReplyCard(parent, false, true, true);
                    // 有热门子回复 → 自动展开
                    if (sortedChildren.length > 0) {
                        html += renderChildrenBlock(parent.id, sortedChildren, top5Ids, true);
                        sortedChildren.forEach(c => hotShownIds.add(c.id));
                    }
                }
            });
        }

        // ===== 最新区 =====
        const restTopLevel = topLevelReplies
            .filter(r => !hotShownIds.has(r.id))
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        if (restTopLevel.length > 0) {
            html += `<div class="sort-divider"><span class="sort-icon">🕒</span><span class="sort-text">最新回复</span><span class="sort-line"></span></div>`;
            restTopLevel.forEach(r => {
                html += renderReplyCard(r, false, false, false);
                if (childrenMap[r.id] && childrenMap[r.id].length > 0) {
                    // 最新区子回复按时间从旧到新排序，默认收起
                    const sortedChildren = [...childrenMap[r.id]].sort((a, b) =>
                        new Date(a.created_at) - new Date(b.created_at));
                    html += renderChildrenBlock(r.id, sortedChildren, top5Ids, false);
                }
            });
        }

        list.innerHTML = html;
    }

    // 渲染子回复区块（带收起/展开切换）
    function renderChildrenBlock(parentId, children, top5Ids, autoExpand) {
        const childCount = children.length;
        if (childCount === 0) return '';

        const containerDisplay = autoExpand ? 'block' : 'none';
        const toggleDisplay = autoExpand ? 'none' : 'flex';
        const toggleText = `查看${childCount}条回复`;

        let html = '';

        // 展开/收起按钮（自动展开时隐藏）
        html += `<div class="children-toggle" id="children-toggle-${parentId}" onclick="toggleChildren('${parentId}')" style="display:${toggleDisplay};">
            <span class="toggle-line"></span>
            <span class="toggle-text">${toggleText}</span>
        </div>`;

        // 子回复容器
        html += `<div id="children-container-${parentId}" style="display:${containerDisplay};">`;
        children.forEach(child => {
            html += renderReplyCard(child, top5Ids.has(child.id), true, false);
        });
        html += `</div>`;

        return html;
    }

    // 切换子回复展开/收起
    function toggleChildren(parentId) {
        const container = document.getElementById(`children-container-${parentId}`);
        const toggle = document.getElementById(`children-toggle-${parentId}`);
        if (!container || !toggle) return;

        const toggleText = toggle.querySelector('.toggle-text');

        if (container.style.display === 'none') {
            container.style.display = 'block';
            toggleText.textContent = '收起回复';
        } else {
            container.style.display = 'none';
            const count = (childrenMap[parentId] || []).length;
            toggleText.textContent = `查看${count}条回复`;
        }
    }

    function renderReplyCard(r, isHot, isIndented, isContext) {
        const rName = r.author_name || '匿名用户';
        const rAvatar = r.author_avatar || flagMap[r.country_code] || '🌍';
        const likeCount = r.likes || 0;
        const dislikeCount = r.dislikes || 0;
        const myVote = userVotes[r.id];

        const likeClass = myVote === 'like' ? 'like-active' : '';
        const dislikeClass = myVote === 'dislike' ? 'dislike-active' : '';
        const hotBadge = isHot ? '<span class="hot-badge">热门</span>' : '';

        let cardClass = 'reply-card';
        if (isIndented) cardClass += ' reply-card-child';
        if (isContext) cardClass += ' reply-card-context';

        return `
            <div class="${cardClass}" id="reply-${r.id}">
                <div class="reply-author">
                    <div class="reply-avatar">${rAvatar}</div>
                    <div class="reply-author-info">
                        <div class="reply-author-name">${rName}</div>
                        <div class="reply-meta">
                            <span>${flagMap[r.country_code] || '🌍'} ${countryMap[r.country_code] || r.country_code}</span>
                            <span>·</span>
                            <span class="reply-time">${timeAgo(r.created_at)}</span>
                        </div>
                    </div>
                    ${hotBadge}
                </div>
                <div class="reply-content">${r.content}</div>
                <div class="reply-actions">
                    <div class="vote-btn ${likeClass}" id="like-btn-${r.id}" onclick="toggleVote('${r.id}', 'like')">
                        👍 <span class="vote-count" id="like-count-${r.id}">${likeCount}</span>
                    </div>
                    <div class="vote-btn ${dislikeClass}" id="dislike-btn-${r.id}" onclick="toggleVote('${r.id}', 'dislike')">
                        👎 <span class="vote-count" id="dislike-count-${r.id}">${dislikeCount}</span>
                    </div>
                    <div class="reply-action-btn" onclick="toggleInlineReply('${r.id}')">💬 回复</div>
                </div>
                <div id="inline-reply-input-${r.id}" class="inline-reply-input" style="display:none;">
                    <textarea class="inline-reply-textarea" id="inline-reply-text-${r.id}"
                        placeholder="回复 ${rName}..." rows="1"
                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitInlineReply('${r.id}');}"></textarea>
                    <div class="inline-reply-actions">
                        <button class="inline-reply-cancel" onclick="toggleInlineReply('${r.id}')">取消</button>
                        <button class="inline-reply-submit" id="inline-submit-${r.id}" onclick="submitInlineReply('${r.id}')">发送</button>
                    </div>
                </div>
            </div>
        `;
    }

    // ===== 内联回复 =====
    function toggleInlineReply(replyId) {
        const el = document.getElementById(`inline-reply-input-${replyId}`);
        if (!el) return;

        // 关闭其他打开的输入框
        if (activeReplyInput && activeReplyInput !== replyId) {
            const prev = document.getElementById(`inline-reply-input-${activeReplyInput}`);
            if (prev) prev.style.display = 'none';
        }

        if (el.style.display === 'none' || el.style.display === '') {
            el.style.display = 'block';
            activeReplyInput = replyId;
            setTimeout(() => document.getElementById(`inline-reply-text-${replyId}`).focus(), 50);
        } else {
            el.style.display = 'none';
            activeReplyInput = null;
        }
    }

    async function submitInlineReply(replyId) {
        const text = document.getElementById(`inline-reply-text-${replyId}`).value.trim();
        if (!text) return;
        if (text.length < 5) { alert('回复内容至少5个字'); return; }

        const submitBtn = document.getElementById(`inline-submit-${replyId}`);
        submitBtn.disabled = true;
        submitBtn.innerText = '发送中...';

        // 确定父评论 ID：如果回复的是子回复，取其根父 ID；否则用当前回复 ID
        const targetReply = replyData[replyId];
        let parentId = replyId;
        if (targetReply && targetReply.parent_id) {
            parentId = targetReply.parent_id;
        }

        try {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const username = session.user.user_metadata?.username || '匿名用户';
            const avatar = session.user.user_metadata?.avatar || '🌍';

            const { error } = await client.from('replies').insert({
                post_id: postId,
                user_id: session.user.id,
                country_code: userCountry,
                content: text,
                author_name: username,
                author_avatar: avatar,
                likes: 0,
                dislikes: 0,
                parent_id: parentId
            });

            if (error) throw error;

            // 关闭输入框，重新加载
            activeReplyInput = null;
            loadReplies();

        } catch (err) {
            alert('回复失败: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = '发送';
        }
    }

    // ===== 投票（乐观更新，不重新加载列表）=====
    async function toggleVote(replyId, type) {
        if (votingLocks[replyId]) return;
        votingLocks[replyId] = true;

        const currentVote = userVotes[replyId];
        const likeCountEl = document.getElementById(`like-count-${replyId}`);
        const dislikeCountEl = document.getElementById(`dislike-count-${replyId}`);
        const likeBtn = document.getElementById(`like-btn-${replyId}`);
        const dislikeBtn = document.getElementById(`dislike-btn-${replyId}`);

        if (!likeCountEl || !dislikeCountEl) { votingLocks[replyId] = false; return; }

        // 保存旧值用于回滚
        const oldLikeCount = parseInt(likeCountEl.textContent) || 0;
        const oldDislikeCount = parseInt(dislikeCountEl.textContent) || 0;
        const oldVote = currentVote;

        // 计算新值
        let newLikeCount = oldLikeCount;
        let newDislikeCount = oldDislikeCount;
        let newVote = null;

        if (type === 'like') {
            if (currentVote === 'like') {
                newLikeCount = oldLikeCount - 1;
                newVote = null;
            } else {
                newLikeCount = oldLikeCount + 1;
                if (currentVote === 'dislike') {
                    newDislikeCount = oldDislikeCount - 1;
                }
                newVote = 'like';
            }
        } else {
            if (currentVote === 'dislike') {
                newDislikeCount = oldDislikeCount - 1;
                newVote = null;
            } else {
                newDislikeCount = oldDislikeCount + 1;
                if (currentVote === 'like') {
                    newLikeCount = oldLikeCount - 1;
                }
                newVote = 'dislike';
            }
        }

        // 乐观更新 UI
        likeCountEl.textContent = newLikeCount;
        dislikeCountEl.textContent = newDislikeCount;
        likeBtn.className = 'vote-btn' + (newVote === 'like' ? ' like-active' : '');
        dislikeBtn.className = 'vote-btn' + (newVote === 'dislike' ? ' dislike-active' : '');
        userVotes[replyId] = newVote;

        // 更新缓存数据
        if (replyData[replyId]) {
            replyData[replyId].likes = newLikeCount;
            replyData[replyId].dislikes = newDislikeCount;
        }

        // 写库
        try {
            if (oldVote) {
                await client.from('reply_votes')
                    .delete()
                    .eq('reply_id', replyId)
                    .eq('user_id', currentUser.id);
            }

            if (newVote) {
                await client.from('reply_votes').insert({
                    reply_id: replyId,
                    user_id: currentUser.id,
                    vote_type: newVote
                });
            }

            await client.from('replies').update({
                likes: newLikeCount,
                dislikes: newDislikeCount
            }).eq('id', replyId);

        } catch (err) {
            // 回滚
            likeCountEl.textContent = oldLikeCount;
            dislikeCountEl.textContent = oldDislikeCount;
            likeBtn.className = 'vote-btn' + (oldVote === 'like' ? ' like-active' : '');
            dislikeBtn.className = 'vote-btn' + (oldVote === 'dislike' ? ' dislike-active' : '');
            userVotes[replyId] = oldVote;
            if (replyData[replyId]) {
                replyData[replyId].likes = oldLikeCount;
                replyData[replyId].dislikes = oldDislikeCount;
            }
            alert('操作失败，请重试');
        }

        votingLocks[replyId] = false;
    }

    // ===== 底部回复框（顶级评论）=====
    async function submitReply() {
        if (cooldownActive) return;

        const content = document.getElementById('replyInput').value.trim();
        if (!content) return;
        if (content.length < 5) { alert('回复内容至少5个字'); return; }

        const btn = document.getElementById('replyBtn');

        if (!isOwnPost) {
            cooldownActive = true;
            btn.disabled = true;
            document.getElementById('cooldownTip').style.display = 'block';
            let seconds = 15;
            btn.innerText = `${seconds}s`;
            const timer = setInterval(() => {
                seconds--;
                btn.innerText = `${seconds}s`;
                if (seconds <= 0) {
                    clearInterval(timer);
                    cooldownActive = false;
                    btn.disabled = false;
                    btn.innerText = '回复';
                    document.getElementById('cooldownTip').style.display = 'none';
                    actuallySubmit(content);
                }
            }, 1000);
            return;
        }

        actuallySubmit(content);
    }

    async function actuallySubmit(content) {
        const btn = document.getElementById('replyBtn');
        btn.disabled = true;
        btn.innerText = '发送中...';

        try {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const username = session.user.user_metadata?.username || '匿名用户';
            const avatar = session.user.user_metadata?.avatar || '🌍';

            const { error } = await client.from('replies').insert({
                post_id: postId,
                user_id: session.user.id,
                country_code: userCountry,
                content: content,
                author_name: username,
                author_avatar: avatar,
                likes: 0,
                dislikes: 0,
                parent_id: null
            });

            if (error) throw error;

            document.getElementById('replyInput').value = '';
            btn.innerText = '回复';
            btn.disabled = false;
            loadReplies();

        } catch (err) {
            alert('回复失败: ' + err.message);
            btn.disabled = false;
            btn.innerText = '回复';
        }
    }

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }

        currentUser = session.user;
        userCountry = currentUser.user_metadata?.country_code || 'CN';

        const params = new URLSearchParams(window.location.search);
        postId = params.get('id');
        if (!postId) { window.location.href = 'index.html'; return; }

        await loadPost();
        await loadReplies();

        const { data: post } = await client.from('posts').select('country_code').eq('id', postId).single();
        isOwnPost = post && post.country_code === userCountry;
    }

    init();
</script>
