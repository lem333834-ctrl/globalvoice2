<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Global Voices</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .register-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 24px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { font-size: 12px; color: #6b7280; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: #374151; margin-bottom: 8px; font-weight: 600; }
        .form-input { width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: #2563eb; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-input { flex: 1; }
        .country-select { appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="%23374151" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 12px center; pad
ding-right: 40px; }
        .avatar-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 4px; }
        .avatar-option { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #e5e7eb; border-radius: 12px; cursor: pointer; transition: all 0.2s; background: white; }
        .avatar-option:hover { border-color: #93c5fd; }
        .avatar-option.selected { border-color: #2563eb; background: #eff6ff; transform: scale(1.05); }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 15px; text-align: center; min-height: 15px; }
        .success-msg { color: #16a34a; font-size: 12px; margin-top: 15px; text-align: center; min-height: 15px; }
        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6b7280; }
        .login-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="logo">
        <h1>🌍 Global Voices</h1>
        <p>One world, many voices</p>
    </div>
    <div id="registerForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-input" placeholder="Choose a username" maxlength="20">
        </div>
        <div class="form-group">
            <label>Choose Avatar</label>
            <div class="avatar-picker" id="avatarPicker">
                <div class="avatar-option selected" data-avatar="🦊" onclick="selectAvatar(this)">🦊</div>
                <div class="avatar-option" data-avatar="🐼" onclick="selectAvatar(this)">🐼</div>
                <div class="avatar-option" data-avatar="🐨" onclick="selectAvatar(this)">🐨</div>
                <div class="avatar-option" data-avatar="🐱" onclick="selectAvatar(this)">🐱</div>
                <div class="avatar-option" data-avatar="🐶" onclick="selectAvatar(this)">🐶</div>
                <div class="avatar-option" data-avatar="🦁" onclick="selectAvatar(this)">🦁</div>
                <div class="avatar-option" data-avatar="🐯" onclick="selectAvatar(this)">🐯</div>
                <div class="avatar-option" data-avatar="🐸" onclick="selectAvatar(this)">🐸</div>
                <div class="avatar-option" data-avatar="🐧" onclick="selectAvatar(this)">🐧</div>
                <div class="avatar-option" data-avatar="🦉" onclick="selectAvatar(this)">🦉</div>
                <div class="avatar-option" data-avatar="🐙" onclick="selectAvatar(this)">🐙</div>
                <div class="avatar-option" data-avatar="🦄" onclick="selectAvatar(this)">🦄</div>
                <div class="avatar-option" data-avatar="🐲" onclick="selectAvatar(this)">🐲</div>
                <div class="avatar-option" data-avatar="🐳" onclick="selectAvatar(this)">🐳</div>
                <div class="avatar-option" data-avatar="🐬" onclick="selectAvatar(this)">🐬</div>
                <div class="avatar-option" data-avatar="🦓" onclick="selectAvatar(this)">🦓</div>
                <div class="avatar-option" data-avatar="🐝" onclick="selectAvatar(this)">🐝</div>
                <div class="avatar-option" data-avatar="🦜" onclick="selectAvatar(this)">🦜</div>
            </div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-input" placeholder="At least 6 characters">
        </div>
        <div class="form-group">
            <label>Phone (for cross-border verification)</label>
            <div class="form-row">
                <select id="phonePrefix" class="form-input country-select" style="width:110px;flex:none;">
                    <option value="+86">🇨🇳 +86</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+81">🇯🇵 +81</option>
                    <option value="+49">🇩🇪 +49</option>
                    <option value="+82">🇰🇷 +82</option>
                    <option value="+91">🇮🇳 +91</option>
                </select>
                <input type="tel" id="phone" class="form-input" placeholder="Enter phone number">
            </div>
        </div>
        <div class="form-group">
            <label>Country (determines your post section)</label>
            <select id="countryCode" class="form-input country-select">
                <option value="">Select your country</option>
                <option value="CN">🇨🇳 中国</option>
                <option value="US">🇺🇸 America</option>
                <option value="JP">🇯🇵 日本</option>
                <option value="DE">🇩🇪 Deutschland</option>
                <option value="FR">🇫🇷 France</option>
                <option value="KR">🇰🇷 한국</option>
                <option value="IN">🇮🇳 भारत</option>
            </select>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        <button class="submit-btn" id="submitBtn" onclick="handleRegister()">Register & Join the World</button>
    </div>
    <div class="login-link">Already have an account? <a href="login.html">Log in</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const { createClient } = supabase;
    const client = createClient(
        'https://rkgwaucoldxpezwgjuoo.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZ3dhdWNvbGR4cGV6d2dqdW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTI0OTYsImV4cCI6MjA5NzY4ODQ5Nn0.nwD1Uymq6b0CoYrezLBdypA8coUJJRDt_APjcaQ2094'
    );

    let selectedAvatar = '🦊';

    function selectAvatar(el) {
        document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
        el.classList.add('selected');
        selectedAvatar = el.dataset.avatar;
    }

    async function handleRegister() {
        const btn = document.getElementById('submitBtn');
        const errBox = document.getElementById('errorMsg');
        const sucBox = document.getElementById('successMsg');
        errBox.innerText = '';
        sucBox.innerText = '';

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phonePrefix = document.getElementById('phonePrefix').value;
        const phone = document.getElementById('phone').value;
        const countryCode = document.getElementById('countryCode').value;

        if (!username || !email || !password || !phone || !countryCode) {
            errBox.innerText = 'Please fill in all required fields';
            return;
        }
        if (password.length < 6) {
            errBox.innerText = 'Password must be at least 6 characters';
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Verifying identity...';

        try {
            const { data, error } = await client.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username,
                        avatar: selectedAvatar,
                        country_code: countryCode,
                        full_phone: phonePrefix + phone
                    }
                }
            });

            if (error) throw error;

            sucBox.innerText = 'Registration successful! Please check your email to verify, then log in.';
            btn.innerText = 'Registered ✓';
        } catch (error) {
            errBox.innerText = 'Registration failed: ' + (error.message || 'Please try again later');
            btn.disabled = false;
            btn.innerText = 'Register & Join the World';
        }
    }
</script>
</body>
</html>
